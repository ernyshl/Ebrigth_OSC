version: '3.9'

services:
  crm-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ../.env
    environment:
      NODE_ENV: production
    depends_on:
      - crm-worker
    networks:
      - ebright-net

  crm-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
    networks:
      - ebright-net

  # Reference external shared services (configured via env vars)
  # postgres and redis are shared across all Ebright modules

networks:
  ebright-net:
    external: true
    name: ebright-net
