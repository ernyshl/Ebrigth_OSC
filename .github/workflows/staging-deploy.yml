name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.209.156.225
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 20m
          script: /home/deploy/deploy.sh osc

  smoke-tests:
    needs: deploy # Only run tests AFTER deployment succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # Run ONLY the unauthenticated boundary tests against the live staging
      # server. The login-dependent specs use seeded test users
      # (test.admin@example.test etc.) that exist only in the CI test DB,
      # not in staging — running them here would always time out.
      - name: Run Playwright smoke (unauth boundary only)
        run: npx playwright test --grep "API auth boundary"
        env:
          # The staging container exposes the app on port 3000. Without
          # the explicit port, requests hit port 80 (nothing there) and
          # every route returns 404 instead of the expected 401.
          BASE_URL: http://103.209.156.225:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

          
